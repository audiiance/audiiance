<!DOCTYPE html>
<html>
<head>
  <title>Audiiance - Real Crawl Workspace</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .screen {
      min-height: 100vh;
      padding: 32px;
      box-sizing: border-box;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
    }

    p {
      margin: 0;
      color: #94a3b8;
    }

    .button {
      background: #22d3ee;
      color: #0f172a;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 18px;
    }

    .card h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .card p {
      font-size: 14px;
      line-height: 1.5;
    }

    .canvas {
      position: relative;
      min-height: 620px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .node {
      position: absolute;
      width: 220px;
      padding: 16px;
      border-radius: 14px;
      background: #1e293b;
      border: 1px solid #334155;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      cursor: pointer;
    }

    .node:hover {
      border-color: #22d3ee;
    }

    .node.active {
      border-color: #22d3ee;
      box-shadow: 0 0 0 2px #22d3ee;
    }

    .node.home {
      border-color: #22c55e;
    }

    .node.link {
      border-color: #f59e0b;
    }

    .node.broken {
      border-color: #ef4444;
    }

    .node h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    .node p {
      font-size: 13px;
      word-break: break-word;
    }

    .line {
      position: absolute;
      height: 2px;
      background: #334155;
      transform-origin: left center;
    }

    .table-wrap {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 20px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 16px;
      border-bottom: 1px solid #1f2937;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #0b1220;
      color: #94a3b8;
    }

    tr {
      cursor: pointer;
    }

    tr:hover {
      background: rgba(34, 211, 238, 0.06);
    }

    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      font-size: 12px;
      font-weight: bold;
    }

    .status.broken {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
    }

    .status.failed {
      background: rgba(245, 158, 11, 0.15);
      color: #fcd34d;
    }

    .loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      box-sizing: border-box;
    }

    .loading h1 {
      font-size: 46px;
      margin-bottom: 12px;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fecaca;
      border-radius: 18px;
      padding: 20px;
      margin-top: 20px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .node {
        position: relative;
        top: auto !important;
        left: auto !important;
        margin: 16px;
      }

      .line {
        display: none;
      }

      .canvas {
        padding: 1px;
      }
    }
  </style>
</head>

<body>
  <div class="loading" id="loadingScreen">
    <div>
      <h1>Real Crawl Started</h1>
      <p id="loadingText">Fetching website structure...</p>
    </div>
  </div>

  <div class="screen" id="resultsScreen" style="display:none;">
    <div class="topbar">
      <div>
        <h1>Real Sitemap Preview</h1>
        <p id="siteUrl">Website: loading...</p>
      </div>

      <div>
        <button class="button" onclick="exportBlueprint()">Export Blueprint</button>
        <button class="button" onclick="window.location.href='/'">Run New Blueprint</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Pages Crawled</h3>
        <p id="pagesCard">Loading...</p>
      </div>

      <div class="card">
        <h3>Homepage Title</h3>
        <p id="titleCard">Loading...</p>
      </div>

      <div class="card">
        <h3>Internal Links Found</h3>
        <p id="linksCard">Loading...</p>
      </div>
    </div>

    <div class="canvas" id="canvas"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Page</th>
            <th>URL</th>
            <th>Status</th>
            <th>HTTP</th>
            <th>Suggested Event</th>
          </tr>
        </thead>
        <tbody id="linksTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const submittedUrl = params.get("url");

    let crawlData = null;
    let selectedUrl = "";

    if (!submittedUrl) {
      showError("No URL was provided. Go back and enter a website URL.");
    } else {
      document.getElementById("loadingText").innerText = "Crawling: " + submittedUrl;
      runCrawl(submittedUrl);
    }

    async function runCrawl(url) {
      try {
        const response = await fetch("/api/crawl?url=" + encodeURIComponent(url));
        const data = await response.json();

        if (!response.ok) {
          showError(data.error || "Crawler failed.");
          return;
        }

        crawlData = normalizeCrawlData(data);

        document.getElementById("loadingScreen").style.display = "none";
        document.getElementById("resultsScreen").style.display = "block";

        renderResults(crawlData);
      } catch (error) {
        showError("Something went wrong while calling the crawler.");
      }
    }

    function normalizeCrawlData(data) {
      if (Array.isArray(data.pages)) {
        return data;
      }

      return {
        crawledUrl: data.crawledUrl,
        pagesCrawled: 1,
        linksFound: data.linksFound || 0,
        pages: [
          {
            url: data.crawledUrl,
            statusCode: data.statusCode,
            title: data.title,
            links: data.links || [],
            suggestedEvent: "page_view",
            status: "Detected"
          }
        ]
      };
    }

    function showError(message) {
      document.getElementById("loadingScreen").innerHTML = `
        <div>
          <h1>Crawl Failed</h1>
          <p>The crawler could not complete this request.</p>
          <div class="error-box">${message}</div>
          <br/>
          <button class="button" onclick="window.location.href='/'">Try Again</button>
        </div>
      `;
    }

    function renderResults(data) {
      const homepage = data.pages[0];

      document.getElementById("siteUrl").innerText = "Website: " + data.crawledUrl;
      document.getElementById("pagesCard").innerText = data.pagesCrawled + " pages crawled across the site.";
      document.getElementById("titleCard").innerText = homepage && homepage.title ? homepage.title : "Untitled homepage";
      document.getElementById("linksCard").innerText = data.linksFound + " unique internal links discovered.";

      renderCanvas(data);
      renderTable(data);
    }

    function renderCanvas(data) {
      const canvas = document.getElementById("canvas");
      canvas.innerHTML = "";

      const pages = data.pages || [];
      if (pages.length === 0) {
        canvas.innerHTML = "<p style='padding:24px;'>No pages were returned from the crawler.</p>";
        return;
      }

      const homepage = pages[0];

      const homeNode = document.createElement("div");
      homeNode.className = getNodeClass(homepage, true) + " active";
      homeNode.style.top = "60px";
      homeNode.style.left = "60px";
      homeNode.innerHTML = `
        <h3>Homepage</h3>
        <p>${homepage.url}</p>
      `;
      homeNode.onclick = function () {
        selectNode(homepage.url);
      };
      canvas.appendChild(homeNode);

      const childPages = pages.slice(1, 13);

      childPages.forEach((page, index) => {
        const row = Math.floor(index / 3);
        const col = index % 3;

        const left = 380 + col * 280;
        const top = 60 + row * 150;

        const line = document.createElement("div");
        line.className = "line";
        line.style.left = "285px";
        line.style.top = "100px";
        line.style.width = Math.max(80, left - 285) + "px";
        canvas.appendChild(line);

        const node = document.createElement("div");
        node.className = getNodeClass(page, false);
        node.style.left = left + "px";
        node.style.top = top + "px";
        node.innerHTML = `
          <h3>${getPathName(page.url)}</h3>
          <p>${page.url}</p>
        `;

        node.onclick = function () {
          selectNode(page.url);
        };

        canvas.appendChild(node);
      });
    }

    function renderTable(data) {
      const table = document.getElementById("linksTable");
      table.innerHTML = "";

      const rows = data.pages.map(page => ({
        name: getPathName(page.url),
        url: page.url,
        event: page.suggestedEvent || suggestEvent(page.url),
        status: page.status || "Detected",
        statusCode: page.statusCode || 0
      }));

      rows.forEach(row => {
        const tr = document.createElement("tr");

        tr.onclick = function () {
          selectNode(row.url);
        };

        tr.innerHTML = `
          <td>${row.name}</td>
          <td>${row.url}</td>
          <td><span class="${getStatusClass(row.status)}">${row.status}</span></td>
          <td>${row.statusCode}</td>
          <td>${row.event}</td>
        `;

        table.appendChild(tr);
      });
    }

    function selectNode(url) {
      selectedUrl = url;

      const nodes = document.querySelectorAll(".node");
      nodes.forEach(node => {
        node.classList.remove("active");
        if (node.innerText.includes(url)) {
          node.classList.add("active");
        }
      });
    }

    function getNodeClass(page, isHome) {
      let baseClass = isHome ? "node home" : "node link";

      if (page.status === "Broken" || page.statusCode >= 400) {
        baseClass += " broken";
      }

      return baseClass;
    }

    function getStatusClass(status) {
      if (status === "Broken") return "status broken";
      if (status === "Failed") return "status failed";
      return "status";
    }

    function getPathName(rawUrl) {
      try {
        const url = new URL(rawUrl);
        if (url.pathname === "/") return "Homepage";

        const clean = url.pathname
          .replaceAll("/", " ")
          .replaceAll("-", " ")
          .replaceAll("_", " ")
          .trim();

        return clean
          ? clean.charAt(0).toUpperCase() + clean.slice(1)
          : "Page";
      } catch {
        return "Page";
      }
    }

    function suggestEvent(rawUrl) {
      const value = rawUrl.toLowerCase();

      if (value.includes("contact")) return "generate_lead";
      if (value.includes("pricing")) return "view_pricing";
      if (value.includes("checkout")) return "begin_checkout";
      if (value.includes("cart")) return "view_cart";
      if (value.includes("blog")) return "view_article";
      if (value.includes("product")) return "view_item";
      if (value.includes("thank")) return "generate_lead";
      if (value.includes("demo")) return "generate_lead";
      if (value.includes("book")) return "generate_lead";

      return "page_view";
    }

    function exportBlueprint() {
      if (!crawlData) {
        alert("No crawl data available yet.");
        return;
      }

      let report = "";

      report += "AUDIIANCE REAL CRAWL BLUEPRINT\n";
      report += "==============================\n\n";
      report += "Website: " + crawlData.crawledUrl + "\n";
      report += "Pages Crawled: " + crawlData.pagesCrawled + "\n";
      report += "Internal Links Found: " + crawlData.linksFound + "\n";
      report += "Generated: " + new Date().toLocaleString() + "\n\n";

      report += "CRAWLED PAGES\n";
      report += "-------------\n";

      crawlData.pages.forEach((page, index) => {
        report += index + 1 + ". " + page.url + "\n";
        report += "Title: " + page.title + "\n";
        report += "HTTP Status: " + page.statusCode + "\n";
        report += "Page Status: " + page.status + "\n";
        report += "Suggested Event: " + (page.suggestedEvent || suggestEvent(page.url)) + "\n";
        report += "Links Found On Page: " + page.links.length + "\n\n";
      });

      const blob = new Blob([report], { type: "text/plain" });
      const downloadUrl = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = downloadUrl;
      a.download = "audiiance-real-crawl-report.txt";
      a.click();

      URL.revokeObjectURL(downloadUrl);
    }
  </script>
</body>
</html>

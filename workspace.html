<!DOCTYPE html>
<html>
<head>
  <title>Audiiance Action Board</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .queue {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      background: #111827;
      padding: 16px;
      border-radius: 12px;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      margin-right: 6px;
    }

    .critical { background: red; }
    .high { background: orange; }
    .medium { background: gold; }
    .low { background: gray; }
  </style>
</head>

<body>

<h1>Audiiance Action Board</h1>

<div id="queue" class="queue"></div>

<script>
const params = new URLSearchParams(window.location.search);
const url = params.get("url");

fetch("/api/crawl?url=" + encodeURIComponent(url))
  .then(res => res.json())
  .then(data => {
    render(data.priorityQueue);
  });

function render(queue) {
  const el = document.getElementById("queue");

  queue.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="badge ${item.priorityLevel.toLowerCase()}">${item.priorityLevel}</div>
      <h3>${item.url}</h3>
      <p><strong>Issue:</strong> ${item.issue}</p>
      <p><strong>Fix:</strong> ${item.recommendation}</p>
      <p><strong>Impact:</strong> ${item.actionBoard.impact}</p>
      <p><strong>Effort:</strong> ${item.actionBoard.effort}</p>
      <p><strong>Category:</strong> ${item.actionBoard.category}</p>
    `;

    el.appendChild(div);
  });
}
</script>

</body>
</html>

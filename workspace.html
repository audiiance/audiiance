<!DOCTYPE html>
<html>
<head>
  <title>Audiiance - Workspace</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
  </style>
</head>

<body>
  <div>
    <h1>Blueprint Initialized</h1>
    <p id="statusText">Preparing analysis...</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get("url");

    if (url) {
      document.getElementById("statusText").innerText = "Analyzing: " + url;
    }
  </script>
</body>
</html>

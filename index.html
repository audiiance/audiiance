<!DOCTYPE html>
<html>
<head>
  <title>Audiiance</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      text-align: center;
    }
    input {
      padding: 12px;
      width: 300px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }
    button {
      padding: 12px 20px;
      margin-top: 10px;
      background: #22d3ee;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Audiiance</h1>
    <p>Enter a website URL</p>
    <input placeholder="https://example.com" />
    <br/>
    <button>Build Blueprint</button>
  </div>
</body>
</html>
